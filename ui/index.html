<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Historia e ndryshimeve</title>
  <style>
    :root {
      --surface-1: #fcfcfb;
      --text-primary: #0b0b0b;
      --text-secondary: #52514e;
      --muted: #898781;
      --grid: #e1e0d9;
      --border: rgba(11, 11, 11, 0.10);
      --cat-original: #2a78d6;
      --cat-amendment: #eda100;
      --cat-repeal: #e34948;
      --cat-ratification: #1baf7a;
      --cat-other: #898781;
      --hover-wash: rgba(11, 11, 11, 0.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #1a1a19;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --muted: #898781;
        --grid: #2c2c2a;
        --border: rgba(255, 255, 255, 0.10);
        --cat-original: #3987e5;
        --cat-amendment: #c98500;
        --cat-repeal: #e66767;
        --cat-ratification: #199e70;
        --cat-other: #898781;
        --hover-wash: rgba(255, 255, 255, 0.06);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--surface-1);
      color: var(--text-primary);
      font: 13px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    #app { padding: 14px 16px 18px; max-width: 860px; margin: 0 auto; }
    .hdr h1 { font-size: 15px; font-weight: 650; margin: 0 0 4px; }
    .hdr .meta { color: var(--text-secondary); font-size: 12px; margin-bottom: 2px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      border: 1px solid var(--border); border-radius: 999px;
      padding: 1px 9px; font-size: 11px; color: var(--text-secondary);
      margin-right: 6px; margin-top: 6px;
    }
    .chip .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .banner {
      margin: 10px 0 2px; padding: 7px 10px; border-radius: 6px;
      border: 1px solid var(--cat-repeal); color: var(--text-primary); font-size: 12px;
    }
    .legend { display: flex; flex-wrap: wrap; gap: 2px 4px; margin: 12px 0 4px; }
    .timeline { margin-top: 8px; }
    .row {
      display: grid; grid-template-columns: 46px 22px 1fr;
      cursor: pointer; border-radius: 6px;
    }
    .row:hover { background: var(--hover-wash); }
    .row .yr {
      color: var(--muted); font-size: 11px; text-align: right;
      padding: 9px 8px 0 0; font-variant-numeric: tabular-nums;
    }
    .row .rail { position: relative; }
    .row .rail::before {
      content: ""; position: absolute; left: 50%; top: 0; bottom: 0;
      width: 1px; background: var(--grid); transform: translateX(-0.5px);
    }
    .row:first-child .rail::before { top: 14px; }
    .row:last-child .rail::before { bottom: auto; height: 14px; }
    .row .dot {
      position: absolute; left: 50%; top: 12px; width: 9px; height: 9px;
      border-radius: 50%; transform: translateX(-50%);
      box-shadow: 0 0 0 2px var(--surface-1);
    }
    .row.is-root .dot { width: 12px; height: 12px; top: 10px; box-shadow: 0 0 0 2px var(--surface-1), 0 0 0 3.5px currentColor; }
    .row .body { padding: 7px 8px 8px 10px; min-width: 0; }
    .row .title { font-size: 12.5px; }
    .row.is-root .title { font-weight: 650; }
    .row .sub { color: var(--text-secondary); font-size: 11px; margin-top: 1px; }
    .row .sub b { font-weight: 600; color: var(--text-primary); }
    .detail {
      grid-column: 3; margin: 2px 8px 8px 10px; padding: 8px 10px;
      border: 1px solid var(--border); border-radius: 6px; font-size: 12px;
      color: var(--text-secondary); overflow-wrap: anywhere;
    }
    .detail a { color: var(--cat-original); }
    .detail .actions { margin-top: 6px; }
    button {
      font: inherit; font-size: 11.5px; color: var(--text-primary);
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 10px; cursor: pointer;
    }
    button:hover { background: var(--hover-wash); }
    .empty { color: var(--muted); padding: 30px 0; text-align: center; }
    .note { color: var(--muted); font-size: 11px; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="app"><div class="empty">Duke pritur të dhënat…</div></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
